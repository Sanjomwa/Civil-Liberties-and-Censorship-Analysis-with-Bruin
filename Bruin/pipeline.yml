# Civil Liberties & Censorship Analysis Pipeline

name: civil_liberties_pipeline
description: >
  End-to-end pipeline integrating ACLED, OONI, Google Transparency,
  and Lumen datasets into staging and mart layers for civil liberties analysis.

# Multiple schedules for freshness
schedules:
  - cron: "@daily" # daily run for OONI + Lumen freshness
    start_date: "2024-01-01"
  - cron: "@quarterly" # quarterly deep refresh for Google Transparency
    start_date: "2024-01-01"

variables:
  country:
    type: string
    default: "Kenya"
  start_date:
    type: string
    default: "2024-01-01"
  end_date:
    type: string
    default: "2026-03-01"

assets:
  # Raw ingestion
  - name: raw.acled_aggregated
    path: assets/ingest/acled_aggregated.py
    type: python
    connection: duckdb-acled

  - name: raw.ooni_raw
    path: assets/ingest/ooni_raw.py
    type: python
    connection: duckdb-ooni

  - name: raw.google_transparency
    path: assets/ingest/google_transparency.py
    type: python
    connection: duckdb-google

  - name: raw.lumen_requests
    path: assets/ingest/lumen_requests.py
    type: python
    connection: duckdb-lumen

  # Staging
  - name: stg.acled
    path: assets/staging/stg_acled.py
    type: python
    connection: duckdb-acled
    depends_on: [raw.acled_aggregated]

  - name: stg.ooni
    path: assets/staging/stg_ooni.py
    type: python
    connection: duckdb-ooni
    depends_on: [raw.ooni_raw]

  - name: stg.google_transparency
    path: assets/staging/stg_google_transparency.py
    type: python
    connection: duckdb-google
    depends_on: [raw.google_transparency]

  - name: stg.lumen
    path: assets/staging/stg_lumen.py
    type: python
    connection: duckdb-lumen
    depends_on: [raw.lumen_requests]

  # Mart
  - name: civil_liberties_mart
    path: assets/mart/civil_liberties_mart.py
    type: python
    connection: duckdb-mart
    depends_on:
      - stg.acled
      - stg.ooni
      - stg.google_transparency
      - stg.lumen
